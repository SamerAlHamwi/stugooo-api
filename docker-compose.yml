services:

  mysql:
    image: mysql:8.0

    container_name: stugooo-mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: stugooo
      MYSQL_USER: stugooo
      MYSQL_PASSWORD: StrongPassword
      MYSQL_ROOT_PASSWORD: RootPassword

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pRootPassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .

    container_name: stugooo-app

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "127.0.0.1:9000:9000"

    volumes:
      - ./storage:/var/www/storage

volumes:
  mysql_data:
